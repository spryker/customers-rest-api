resource:
    name: CustomerRestorePassword
    shortName: customer-restore-password
    description: 'Restore customer password using a reset key'

    uriVariables:
        restorePasswordKey:
            type: string
            description: 'The password restore key sent via email'
            example: 'abc123def456'

    operations:
        - type: Patch
          uriTemplate: '/customer-restore-password/{restorePasswordKey}'
          output: false
          read: false
          description: 'Set a new password using the restore key'
          openapiContext:
              summary: 'Restore customer password'
              description: 'Validates the restore password key and sets a new password for the customer account.'
              responses:
                  204:
                      description: 'Password restored successfully.'
                  422:
                      description: 'Passwords do not match or restore key is invalid.'

    processor: Spryker\Glue\CustomersRestApi\Api\Storefront\Processor\CustomerRestorePasswordStorefrontProcessor

    properties:
        restorePasswordKey:
            type: string
            identifier: true
            writable: true
            readable: true
            description: 'The password restore key from the reset email'
            openapiContext:
                example: 'abc123def456'

        password:
            type: string
            writable: true
            readable: false
            required: true
            description: 'The new password'
            openapiContext:
                example: 'NewP@ssw0rd123!'

        confirmPassword:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Confirmation of the new password'
            openapiContext:
                example: 'NewP@ssw0rd123!'
