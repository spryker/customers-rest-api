resource:
    name: CustomerPassword
    shortName: customer-password
    description: 'Change the password for an authenticated customer'

    uriVariables:
        customerReference:
            type: string
            description: 'The unique customer reference identifier'
            example: 'DE--123'

    security: "is_granted('ROLE_CUSTOMER')"

    operations:
        - type: Patch
          uriTemplate: '/customer-password/{customerReference}'
          output: false
          read: false
          description: 'Update customer password'
          openapiContext:
              summary: 'Change customer password'
              description: 'Updates the password for an authenticated customer. Requires the current password and a new password with confirmation.'
              responses:
                  204:
                      description: 'Password updated successfully.'
                  400:
                      description: 'Current password is invalid, or the new password contains a forbidden character sequence.'
                  401:
                      description: 'Missing or invalid access token.'
                  403:
                      description: 'Access denied — customer reference does not belong to the authenticated user.'
                  404:
                      description: 'Customer not found.'
                  422:
                      description: 'New password and confirmation password do not match.'

    processor: Spryker\Glue\CustomersRestApi\Api\Storefront\Processor\CustomerPasswordStorefrontProcessor

    properties:
        customerReference:
            type: string
            identifier: true
            writable: false
            readable: true
            description: 'The unique customer reference identifier'
            openapiContext:
                example: 'DE--123'

        password:
            type: string
            writable: true
            readable: false
            required: true
            description: 'The current password'
            openapiContext:
                example: 'CurrentP@ssw0rd!'

        newPassword:
            type: string
            writable: true
            readable: false
            required: true
            description: 'The new password'
            openapiContext:
                example: 'NewP@ssw0rd123!'

        confirmPassword:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Confirmation of the new password'
            openapiContext:
                example: 'NewP@ssw0rd123!'
