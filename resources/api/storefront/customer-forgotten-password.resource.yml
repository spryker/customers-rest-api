resource:
    name: CustomerForgottenPassword
    shortName: customer-forgotten-password
    description: 'Request a password reset email for a customer account'

    operations:
        - type: Post
          uriTemplate: '/customer-forgotten-password'
          output: false
          read: false
          description: 'Send a password restore email to the customer'
          openapiContext:
              summary: 'Request password reset'
              description: 'Sends a password restore email to the specified email address. Always returns 204 regardless of whether the email exists.'
              responses:
                  204:
                      description: 'Password restore email sent (or silently ignored if email not found).'

    processor: Spryker\Glue\CustomersRestApi\Api\Storefront\Processor\CustomerForgottenPasswordStorefrontProcessor

    properties:
        email:
            type: string
            identifier: true
            writable: true
            readable: true
            required: true
            description: "The customer's email address"
            openapiContext:
                example: 'john.doe@example.com'
